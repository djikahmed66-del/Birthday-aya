<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Aya</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
}

/* Slides */
.slide {
  display: none;
  height: 100vh;
  width: 100%;
  position: absolute;
  top: 0;
  left: 0;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* Slide 1 */
.slide1 {
  background: linear-gradient(120deg, #ffecd2, #fcb69f);
}

/* Slide 2 */
.slide2 {
  background: linear-gradient(120deg, #a1c4fd, #c2e9fb);
}

/* Slide 3 */
.slide3 {
  background: linear-gradient(120deg, #fbc2eb, #a6c1ee);
}

/* Text */
.happy {
  font-size: 3em;
  color: white;
  animation: bounce 2s infinite;
}

.name {
  font-size: 2.5em;
  color: #ff4081;
}

/* Button */
button {
  padding: 10px 20px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #ff4081;
  color: white;
  cursor: pointer;
  margin-top: 20px;
}

/* Balloons */
.balloon {
  position: absolute;
  bottom: -150px;
  width: 60px;
  height: 80px;
  background: red;
  border-radius: 50%;
  animation: float 6s infinite;
}

@keyframes float {
  0% { bottom: -150px;}
  100% { bottom: 110vh;}
}

@keyframes bounce {
  50% { transform: translateY(-20px);}
}

/* Navigation */
.nav {
  position: fixed;
  bottom: 20px;
  width: 100%;
  text-align: center;
}
</style>

</head>
<body>

<!-- Slide 1 -->
<div class="slide slide1">
  <div class="happy">🎉 Happy Birthday 🎂</div>
  <div class="name">Aya 💖</div>
</div>

<!-- Slide 2 -->
<div class="slide slide2">
  <div class="happy">💌 Message for Aya</div>
  <button onclick="showMessage()">Click Me</button>
  <p id="msg" style="color:white; display:none; font-size:20px;">
    Aya 💖 nti wa7da mn ahsan nas li 3raft 💫  
    kanbghik بزاف وكنتمنا ليك السعادة ديما 🎂✨
  </p>
</div>

<!-- Slide 3 -->
<div class="slide slide3">
  <div class="happy">🎈 Enjoy Your Day 🎉</div>
</div>

<!-- Navigation -->
<div class="nav">
  <button onclick="prevSlide()">⬅️</button>
  <button onclick="nextSlide()">➡️</button>
</div>

<script>
let current = 0;
let slides = document.querySelectorAll(".slide");

function showSlide(index) {
  slides.forEach(s => s.style.display = "none");
  slides[index].style.display = "flex";
}

function nextSlide() {
  current = (current + 1) % slides.length;
  showSlide(current);
}

function prevSlide() {
  current = (current - 1 + slides.length) % slides.length;
  showSlide(current);
}

function showMessage() {
  document.getElementById("msg").style.display = "block";
}

showSlide(current);
</script>

</body>
</html>
