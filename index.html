<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Aya 🎂</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: sans-serif;
}

/* Reel container */
.reel {
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* Slides */
.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
  opacity: 0;
  transform: scale(1.1);
  transition: all 1s ease;
}

.slide.active {
  opacity: 1;
  transform: scale(1);
}

/* Backgrounds */
.s1 { background: linear-gradient(120deg,#ff416c,#ff4b2b); }
.s2 { background: linear-gradient(120deg,#2193b0,#6dd5ed); }
.s3 { background: linear-gradient(120deg,#cc2b5e,#753a88); }

/* Text */
.title {
  font-size: 40px;
  text-align: center;
  animation: fadeUp 1.5s ease;
}

.name {
  font-size: 50px;
  color: #ffccff;
}

/* Button */
button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  background: white;
  color: black;
  font-size: 18px;
  cursor: pointer;
}

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(40px);}
  to { opacity: 1; transform: translateY(0);}
}

/* Floating emojis */
.float {
  position: absolute;
  font-size: 25px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(100vh);}
  to { transform: translateY(-10vh);}
}
</style>

</head>
<body>

<div class="reel">

  <!-- Slide 1 -->
  <div class="slide s1 active">
    <div class="title">🎉 Happy Birthday 🎂</div>
    <div class="name">Aya 💖</div>
  </div>

  <!-- Slide 2 -->
  <div class="slide s2">
    <div class="title">💌 Message</div>
    <button onclick="showMsg()">Click 💖</button>
    <p id="msg" style="display:none;">
      Aya 💕 nti wa7da mn ahsan nas ❤️  
      kanbghik بزاف وكنتمنا ليك السعادة 🎉✨
    </p>
  </div>

  <!-- Slide 3 -->
  <div class="slide s3">
    <div class="title">🎈 Enjoy Your Day 🎉</div>
  </div>

</div>

<script>
let slides = document.querySelectorAll(".slide");
let index = 0;

function nextSlide(){
  slides[index].classList.remove("active");
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
}

setInterval(nextSlide, 4000);

function showMsg(){
  document.getElementById("msg").style.display="block";
}

/* Emojis floating */
let emojis = ["💖","🎉","🎈","✨","🎂"];
for(let i=0;i<20;i++){
  let e = document.createElement("div");
  e.className="float";
  e.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
  e.style.left = Math.random()*100+"vw";
  e.style.animationDuration = (3+Math.random()*3)+"s";
  document.body.appendChild(e);
}
</script>

</body>
</html>
